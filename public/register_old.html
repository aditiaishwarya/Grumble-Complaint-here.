<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Sign Up</h2>

<input id="name" placeholder="First name">
<input id="name" placeholder="Second Name">
<input id="name" placeholder="Last Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<input id="passwordConfirm" type="password" placeholder="Confirm Password">
<input id="roomNumber" placeholder="Room Number">

<select id="role">
  <option value="student">Student</option>
  <option value="staff">Staff</option>
  <option value="admin">Admin</option>
</select>

<button onclick="register()">Create Account</button>

<p>Already have an account? <a href="login.html">Sign In</a></p>

<script>
async function register() {

  const firstName = document.getElementById("name");
  const secondName = document.getElementById("name");
  const lastName = document.getElementById("name");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const passwordConfirm = document.getElementById("passwordConfirm");
  const roomInput = document.getElementById("roomNumber");
  const roleInput = document.getElementById("role");

  const res = await fetch('/register', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      firstName: firstName.value.trim(),
      secondName: secondName.value.trim(),
      lastName: lastName.value.trim(),
      email: emailInput.value.trim().toLowerCase(),
      password: passwordInput.value.trim(),
      passwordConfirm: passwordConfirm.value.trim(),
      roomNumber: roomInput.value.trim(),
      role: roleInput.value
    })
  });

  const data = await res.json();

  if (res.status === 201) {
    alert("Account created successfully!");
    window.location.href = "login.html";
  } else {
    alert(data.message || "Something went wrong");
  }
  
}
</script>

</body>
</html>
